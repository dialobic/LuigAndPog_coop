<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, user-scalable=no, initial-scale=1.0">
  <title>$GODOT_PROJECT_NAME</title>
  <style>
    html,
    body,
    #canvas {
      margin: 0;
      padding: 0;
      border: 0;
    }

    html,
    body {
      width: 100%;
      height: 100%;
    }

    body {
      color: white;
      background-color: black;
      overflow: hidden;
      touch-action: none;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    #canvas {
      display: block;
      max-width: 100%;
      max-height: 100%;
      aspect-ratio: 16 / 9;
    }

    #canvas:focus {
      outline: none;
    }

    #status,
    #status-splash,
    #status-progress {
      position: absolute;
      left: 0;
      right: 0;
    }

    #status,
    #status-splash {
      top: 0;
      bottom: 0;
    }

    #status {
      background-color: $GODOT_SPLASH_COLOR;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      visibility: hidden;
    }

    #status-splash {
      max-height: 100%;
      max-width: 100%;
      margin: auto;
    }

    #status-splash.show-image--false {
      display: none;
    }

    #status-splash.fullsize--true {
      height: 100%;
      width: 100%;
      object-fit: contain;
    }

    #status-splash.use-filter--false {
      image-rendering: pixelated;
    }

    #status-progress,
    #status-notice {
      display: none;
    }

    #status-progress {
      bottom: 10%;
      width: 50%;
      margin: 0 auto;
    }

    #status-notice {
      background-color: #5b3943;
      border-radius: 0.5rem;
      border: 1px solid #9b3943;
      color: #e0e0e0;
      font-family: 'Noto Sans', 'Droid Sans', Arial, sans-serif;
      line-height: 1.3;
      margin: 0 2rem;
      overflow: hidden;
      padding: 1rem;
      text-align: center;
      z-index: 1;
    }
  </style>
  $GODOT_HEAD_INCLUDE
</head>

<body>
  <canvas id="canvas">
    Your browser does not support the canvas tag.
  </canvas>

  <noscript>
    Your browser does not support JavaScript.
  </noscript>

  <div id="status">
    <img id="status-splash" class="$GODOT_SPLASH_CLASSES" src="$GODOT_SPLASH" alt="">
    <progress id="status-progress"></progress>
    <div id="status-notice"></div>
  </div>

  <script src="$GODOT_URL"></script>
  <script>
    const GODOT_CONFIG = $GODOT_CONFIG;
    const GODOT_THREADS_ENABLED = $GODOT_THREADS_ENABLED;
    const engine = new Engine(GODOT_CONFIG);

    (function () {
      const statusOverlay = document.getElementById('status');
      const statusProgress = document.getElementById('status-progress');
      const statusNotice = document.getElementById('status-notice');

      let initializing = true;
      let statusMode = '';

      const canvas = document.getElementById('canvas');
      const MAX_DPR = 1.0;
      const MAX_WIDTH = 1920;
      const MAX_HEIGHT = 1080;
      const ASPECT = 16 / 9;

      function resizeCanvas() {
        const winW = window.innerWidth;
        const winH = window.innerHeight;

        let cssW = winW;
        let cssH = winW / ASPECT;
        if (cssH > winH) {
          cssH = winH;
          cssW = winH * ASPECT;
        }
        if (cssW > MAX_WIDTH) {
          cssW = MAX_WIDTH;
          cssH = MAX_WIDTH / ASPECT;
        }
        if (cssH > MAX_HEIGHT) {
          cssH = MAX_HEIGHT;
          cssW = MAX_HEIGHT * ASPECT;
        }

        const dpr = Math.min(window.devicePixelRatio, MAX_DPR);
        canvas.width = Math.floor(cssW * dpr);
        canvas.height = Math.floor(cssH * dpr);
        canvas.style.width = cssW + 'px';
        canvas.style.height = cssH + 'px';
        console.log('[couch-games] canvas:', canvas.width, 'x', canvas.height, '| css:', cssW, 'x', cssH, '| dpr:', dpr);
      }

      // This shell is the single source of truth for canvas size. Godot's
      // canvas_resize_policy is set to 0 (None) for this preset so the engine
      // never resizes the canvas itself — that removes the dual-owner race that
      // left the game zoomed-in after exiting fullscreen.
      window.addEventListener('resize', resizeCanvas);

      // A ResizeObserver fires after layout has settled, so it reliably catches
      // the reflow on fullscreen exit in both Chrome and Firefox. The plain
      // 'resize' event is unreliable across fullscreen transitions (Chrome
      // often doesn't fire it, or fires it before innerWidth has updated),
      // which is what caused the intermittent zoomed-in view.
      if (window.ResizeObserver) {
        new ResizeObserver(resizeCanvas).observe(document.documentElement);
      }

      // fullscreenchange is the semantic event for the transition; the extra
      // rAF pass covers the frame where window.innerWidth may not be updated yet.
      function handleFullscreenChange() {
        resizeCanvas();
        requestAnimationFrame(resizeCanvas);
      }
      document.addEventListener('fullscreenchange', handleFullscreenChange);
      document.addEventListener('webkitfullscreenchange', handleFullscreenChange);

      resizeCanvas();

      function setStatusMode(mode) {
        if (statusMode === mode || !initializing) {
          return;
        }
        if (mode === 'hidden') {
          statusOverlay.remove();
          initializing = false;
          return;
        }
        statusOverlay.style.visibility = 'visible';
        statusProgress.style.display = mode === 'progress' ? 'block' : 'none';
        statusNotice.style.display = mode === 'notice' ? 'block' : 'none';
        statusMode = mode;
      }

      function setStatusNotice(text) {
        while (statusNotice.lastChild) {
          statusNotice.removeChild(statusNotice.lastChild);
        }
        const lines = text.split('\n');
        lines.forEach((line) => {
          statusNotice.appendChild(document.createTextNode(line));
          statusNotice.appendChild(document.createElement('br'));
        });
      }

      function displayFailureNotice(err) {
        console.error(err);
        if (err instanceof Error) {
          setStatusNotice(err.message);
        } else if (typeof err === 'string') {
          setStatusNotice(err);
        } else {
          setStatusNotice('An unknown error occurred.');
        }
        setStatusMode('notice');
        initializing = false;
      }

      const missing = Engine.getMissingFeatures({
        threads: GODOT_THREADS_ENABLED,
      });

      if (missing.length !== 0) {
        if (GODOT_CONFIG['serviceWorker'] && GODOT_CONFIG['ensureCrossOriginIsolationHeaders'] && 'serviceWorker' in navigator) {
          let serviceWorkerRegistrationPromise;
          try {
            serviceWorkerRegistrationPromise = navigator.serviceWorker.getRegistration();
          } catch (err) {
            serviceWorkerRegistrationPromise = Promise.reject(new Error('Service worker registration failed.'));
          }
          // There's a chance that installing the service worker would fix the issue
          Promise.race([
            serviceWorkerRegistrationPromise.then((registration) => {
              if (registration != null) {
                return Promise.reject(new Error('Service worker already exists.'));
              }
              return registration;
            }).then(() => engine.installServiceWorker()),
            // For some reason, `getRegistration()` can stall
            new Promise((resolve) => {
              setTimeout(() => resolve(), 2000);
            }),
          ]).then(() => {
            // Reload if there was no error.
            window.location.reload();
          }).catch((err) => {
            console.error('Error while registering service worker:', err);
          });
        } else {
          // Display the message as usual
          const missingMsg = 'Error\nThe following features required to run Godot projects on the Web are missing:\n';
          displayFailureNotice(missingMsg + missing.join('\n'));
        }
      } else {
        setStatusMode('progress');
      }
      window.copyToFS = async (name, data) => {
        console.log("Copying to fs", name)
        await engine.copyToFS(`/tmp/level.pck`, data)

        if (engine.Module && engine.Module.FS) {
          engine.Module.FS.syncfs(false, function (err) {
            if (err) console.error("FS Sync Error:", err);
          });
        }
      }
      window.addEventListener("couch-games-levels-loaded", async (event) => {
        await copyToFS(event.file, event.data)
        launchGame();
      })

      engine.init("index").then(() => {
        window.__couchGamesEngineReady = true;
        parent.postMessage({type: "couch-games-engine-ready"}, "*");
      })

      async function launchGame() {
        return engine.startGame({
          'onProgress': function (current, total) {
            if (current > 0 && total > 0) {
              statusProgress.value = current;
              statusProgress.max = total;
            } else {
              statusProgress.removeAttribute('value');
              statusProgress.removeAttribute('max');
            }
          },
          "args": ['--extra-pack=/tmp/level.pck']
        }).then(() => {
          setStatusMode('hidden');
        }, displayFailureNotice);
      }
    }());
  </script>
</body>

</html>
